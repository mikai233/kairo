name: Rust CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y clang mold protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Check lints
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y clang mold protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: cargo test --workspace --all-targets --all-features

  integration:
    name: Examples and Multi-Node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y clang mold protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
      - name: Run example integration tests
        run: cargo test -p kairo-examples --all-targets --all-features
      - name: Run example docs
        run: cargo test -p kairo-examples --doc --all-features
      - name: Run local multi-node harness tests
        run: cargo test -p kairo-testkit multi_node --all-targets --all-features

  docs:
    name: Rustdoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y clang mold protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
      - name: Build workspace docs with warnings denied
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --all-features --no-deps

  benchmarks:
    name: Benchmark Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y clang mold protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
      - name: Run M13 benchmark smoke
        run: KAIRO_BENCH_ITERS=100 cargo run -p kairo-benchmarks -- all
